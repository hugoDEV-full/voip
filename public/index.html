<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoIP Monitoring Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <i class="bi bi-telephone-fill me-2"></i>
        <span>VoIP Monitor</span>
      </a>

      <div class="d-flex gap-2 align-items-center">
        <!-- Language Selector -->
        <div class="dropdown me-3">
          <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
            <i class="bi bi-globe"></i> <span id="currentLang">PT</span>
          </button>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#" data-lang="pt">🇧🇷 Português</a></li>
            <li><a class="dropdown-item" href="#" data-lang="en">🇺🇸 English</a></li>
          </ul>
        </div>
        
        <!-- Original simulation buttons -->
        <button id="btnSimNormal" class="btn btn-outline-light btn-sm" title="Inicia uma chamada com fluxo SIP completo e RTP bidirecional (baseline sem problemas)" data-i18n="btnNormal">
          Iniciar chamada (normal)
        </button>
        <button id="btnSimOneWay" class="btn btn-warning btn-sm" title="Gera um cenário de one-way audio: A envia RTP mas B não recebe. O sistema detecta 'RTP flow broken' e aponta NAT/Firewall" data-i18n="btnOneWay">
          Iniciar chamada (one-way audio)
        </button>
        <button id="btnSimNat" class="btn btn-danger btn-sm" title="Gera um cenário de NAT incorreto: SDP de A anuncia IP privado (c=10.x.x.x), causando falha de mídia e latência elevada" data-i18n="btnNat">
          Iniciar chamada (NAT incorreto)
        </button>
        <button id="btnAnalyze" class="btn btn-info btn-sm" title="Lê /pcap/traffic_log.txt e gera diagnóstico de tráfego SIP/RTP (estilo análise rápida de Wireshark/sngrep)" data-i18n="btnAnalyze">
          Analisar tráfego SIP
        </button>
        
        <div class="nav-item dropdown">
          <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-person-circle me-1"></i>
            <span id="userDisplay">Carregando...</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><h6 class="dropdown-header" data-i18n="userInfo">Informações do Usuário</h6></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#" id="logoutBtn">
              <i class="bi bi-box-arrow-right"></i> <span data-i18n="logout">Sair</span>
            </a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    <!-- Notifications Container -->
    <div id="notifications-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1050; max-width: 400px;">
    </div>

    <div class="row g-4">
      <!-- Left Column - Status Cards -->
      <div class="col-lg-4">
        <!-- System Status Card -->
        <div class="card shadow-sm border-0 mb-4">
          <div class="card-header bg-primary text-white">
            <div class="d-flex justify-content-between align-items-center">
              <h6 class="mb-0">
                <i class="bi bi-speedometer2 me-2"></i>
                <span data-i18n="systemStatus">Status do Sistema</span>
              </h6>
              <span id="systemStatus" class="badge bg-success">Online</span>
            </div>
          </div>
          <div class="card-body">
            <div class="row text-center">
              <div class="col-4">
                <div class="text-primary fs-4 fw-bold" id="activeCallsCount">0</div>
                <small class="text-muted" data-i18n="activeCalls">Chamadas Ativas</small>
              </div>
              <div class="col-4">
                <div class="text-warning fs-4 fw-bold" id="alertsCount">0</div>
                <small class="text-muted" data-i18n="alerts">Alertas</small>
              </div>
              <div class="col-4">
                <div class="text-info fs-4 fw-bold" id="eventsCount">0</div>
                <small class="text-muted" data-i18n="events">Eventos</small>
              </div>
            </div>
          </div>
        </div>

        <!-- Active Calls Card -->
        <div class="card shadow-sm border-0 mb-4">
          <div class="card-header bg-success text-white">
            <h6 class="mb-0">
              <i class="bi bi-telephone-fill me-2"></i>
              <span data-i18n="callsHeader">Chamadas Ativas</span>
            </h6>
          </div>
          <div class="card-body p-0">
            <div id="calls" class="small" style="max-height: 300px; overflow-y: auto;">
            </div>
          </div>
        </div>

        <!-- Network Alerts Card -->
        <div class="card shadow-sm border-0">
          <div class="card-header bg-warning text-dark">
            <h6 class="mb-0">
              <i class="bi bi-exclamation-triangle-fill me-2"></i>
              <span data-i18n="alertsHeader">Alertas de Rede</span>
            </h6>
          </div>
          <div class="card-body p-0">
            <div id="alerts" class="small" style="max-height: 300px; overflow-y: auto;">
            </div>
          </div>
        </div>
      </div>

      <!-- Right Column - Events and Stats -->
      <div class="col-lg-8">
        <!-- Real-time Events -->
        <div class="card shadow-sm border-0 mb-4">
          <div class="card-header bg-info text-white">
            <div class="d-flex justify-content-between align-items-center">
              <h6 class="mb-0">
                <i class="bi bi-activity me-2"></i>
                <span data-i18n="eventsHeader">Eventos em Tempo Real</span>
              </h6>
              <div class="d-flex gap-2">
                <button id="btnClearEvents" class="btn btn-outline-light btn-sm">
                  <i class="bi bi-arrow-clockwise"></i> Limpar
                </button>
                <button id="btnPauseEvents" class="btn btn-outline-light btn-sm">
                  <i class="bi bi-pause-fill"></i> Pausar
                </button>
              </div>
            </div>
          </div>
          <div class="card-body p-3">
            <div id="events" class="small font-monospace" style="height: 400px; overflow-y: auto; background-color: #f8f9fa; border-radius: 4px; padding: 12px;">
            </div>
          </div>
        </div>

        <!-- System Statistics -->
        <div class="card shadow-sm border-0">
          <div class="card-header bg-secondary text-white">
            <h6 class="mb-0">
              <i class="bi bi-cpu me-2"></i>
              <span data-i18n="statsHeader">System Stats</span>
            </h6>
          </div>
          <div class="card-body">
            <div class="row">
              <div class="col-md-6">
                <div class="d-flex justify-content-between mb-2">
                  <span>CPU Usage</span>
                  <span class="badge bg-primary" id="cpuUsage">0%</span>
                </div>
                <div class="progress mb-3" style="height: 8px;">
                  <div class="progress-bar bg-primary" id="cpuBar" style="width: 0%"></div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="d-flex justify-content-between mb-2">
                  <span>Memory Usage</span>
                  <span class="badge bg-info" id="memUsage">0%</span>
                </div>
                <div class="progress mb-3" style="height: 8px;">
                  <div class="progress-bar bg-info" id="memBar" style="width: 0%"></div>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <small class="text-muted">Uptime: <span id="uptime">0s</span></small>
              </div>
              <div class="col-md-6 text-end">
                <small class="text-muted">Last Update: <span id="lastUpdate">--:--:--</span></small>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
