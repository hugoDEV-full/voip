<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoIP Monitoring Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <i class="bi bi-telephone-fill me-2"></i>
        <span>VoIP Monitor</span>
      </a>

      <div class="navbar-nav ms-auto">
        <div class="nav-item dropdown">
          <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-person-circle me-1"></i>
            <span id="userDisplay">Carregando...</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><h6 class="dropdown-header">Informações do Usuário</h6></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="/ajuda">
              <i class="bi bi-question-circle"></i> Como funciona?
            </a></li>
            <li><a class="dropdown-item" href="#" id="logoutBtn">
              <i class="bi bi-box-arrow-right"></i> Sair
            </a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-3">
    <div class="row g-3">
      <div class="col-lg-4">
        <div class="card shadow-sm">
          <div class="card-header" data-bs-toggle="tooltip" data-bs-placement="right" title="Lista de calls ativas (como uma visão resumida do que você veria no sngrep). Passe o mouse para ver dicas de cenário/NAT/SDP.">Chamadas ativas</div>
          <div class="card-body">
            <div id="calls" class="small"></div>
          </div>
        </div>

        <div class="card shadow-sm mt-3">
          <div class="card-header" data-bs-toggle="tooltip" data-bs-placement="right" title="Alertas gerados por regras: one-way audio (RTP abaixo do esperado), suspeita de NAT/Firewall e latência > 150ms.">Alertas de rede</div>
          <div class="card-body">
            <div id="alerts" class="small"></div>
          </div>
        </div>

        <div class="card shadow-sm mt-3">
          <div class="card-header" data-bs-toggle="tooltip" data-bs-placement="right" title="Métricas do backend (CPU/memória/calls ativas). Ajuda a demonstrar monitoramento básico em produção.">System Stats</div>
          <div class="card-body">
            <pre id="stats" class="mb-0 small"></pre>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-header" data-bs-toggle="tooltip" data-bs-placement="left" title="Feed em tempo real: SIP (mensagens completas), métricas RTP (esperado/recebido/latência) e eventos ESL simulados (CHANNEL_CREATE/ANSWER/HANGUP).">Eventos em tempo real (SIP / RTP / ESL)</div>
          <div class="card-body p-2">
            <div id="events" class="small" style="height: 600px; overflow-y: auto;"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
