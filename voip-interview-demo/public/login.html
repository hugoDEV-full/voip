<!DOCTYPE html>
<html lang="pt-BR" data-i18n-lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="title">VoIP Monitoring Platform - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      padding: 2.5rem;
      max-width: 420px;
      width: 100%;
    }
    .logo {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }
    .btn-login {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      padding: 0.75rem 2rem;
      font-weight: 600;
      transition: transform 0.2s;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    .demo-credentials {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 1rem;
      margin-top: 1.5rem;
      font-size: 0.875rem;
    }
    .language-selector {
      position: absolute;
      top: 20px;
      right: 20px;
    }
  </style>
</head>
<body>
  <!-- Language Selector -->
  <div class="language-selector">
    <div class="dropdown">
      <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
        <i class="bi bi-globe"></i> <span id="currentLang">PT</span>
      </button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" href="#" data-lang="pt">🇧🇷 Português</a></li>
        <li><a class="dropdown-item" href="#" data-lang="en">🇺🇸 English</a></li>
      </ul>
    </div>
  </div>

  <div class="login-container">
    <div class="text-center mb-4">
      <div class="logo">
        <i class="bi bi-telephone-fill text-primary"></i>
      </div>
      <h2 class="fw-bold" data-i18n="loginTitle">VoIP Monitoring Platform</h2>
      <p class="text-muted" data-i18n="loginSubtitle">Acesso ao sistema de monitoramento</p>
    </div>

    <form id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label" data-i18n="usernameLabel">Usuário</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="username" data-i18n-placeholder="usernamePlaceholder" placeholder="Digite seu usuário" required>
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label" data-i18n="passwordLabel">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" data-i18n-placeholder="passwordPlaceholder" placeholder="Digite sua senha" required>
        </div>
      </div>

      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="rememberMe">
        <label class="form-check-label" for="rememberMe" data-i18n="rememberMe">Lembrar-me</label>
      </div>

      <button type="submit" class="btn btn-primary btn-login w-100" data-i18n="loginButton">Entrar</button>
    </form>

    <div class="demo-credentials">
      <h6 class="fw-bold mb-2" data-i18n="demoTitle">Acesso ao Sistema</h6>
      <div class="row mb-2">
        <div class="col-12">
          <small class="text-muted d-block" data-i18n="demoUser">Usuário:</small>
          <code>admin</code>
        </div>
      </div>
      <small class="text-muted d-block mt-2" data-i18n="demoNote">Use o usuário acima e a senha fornecida para acessar</small>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="login.js"></script>
</body>
</html>
